<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>学习记录</title>
<style>
:root { --card-alpha:0.92;
  --bg: #fafaf8; --text: #1c1b18; --text2: #5f5b55; --text3: #8b857d;
  --blue: #2563eb; --blue-bg: #eff4ff; --green: #16a34a; --orange: #ea580c; --red: #dc2626;
  --math: #2563eb; --cs: #7c3aed; --eng: #ea580c; --pol: #dc2626;
  --border: #e7e4de; --border-strong: #d4d0c8;
  --radius: 12px; --radius-sm: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.05); --shadow: 0 4px 16px rgba(0,0,0,.06);
  --card-alpha: 0.92;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:transparent}body{
  font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:transparent; color:var(--text); font-size:16px; line-height:1.7;
  -webkit-font-smoothing:antialiased; padding:16px 20px 20px;
}

/* ── Week bar (nav + progress) ── */
.week-progress-bar {
  display:flex; align-items:center; gap:8px; margin-bottom:16px;
  padding:10px 16px;
  background:rgba(255,255,255,var(--card-alpha));
  border:1px solid var(--border); border-radius:var(--radius-sm);
  box-shadow:var(--shadow-sm); flex-wrap:wrap;
}
.week-nav-btn {
  width:32px; height:32px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,var(--card-alpha));
  border:1px solid var(--border);
  color:var(--text); cursor:pointer; font-size:.9em;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; flex-shrink:0;
}
.week-nav-btn:hover { background:rgba(239,244,255,var(--card-alpha)); border-color:var(--blue); color:var(--blue); }
.week-label {
  font-size:.93em; font-weight:650; color:var(--text);
  min-width:150px; text-align:center;
}
.week-today-btn {
  background:var(--blue); color:#fff; border:none;
  padding:6px 14px; border-radius:var(--radius-sm);
  font-size:.78em; font-weight:600; cursor:pointer;
  font-family:inherit; transition:opacity .2s;
  white-space:nowrap;
}
.week-today-btn:hover { opacity:.85; }

/* ── Week progress dots ── */
.week-progress-bar .wdots {
  display:flex; gap:5px; align-items:center; flex:1; justify-content:center;
}
.week-progress-bar .wdot {
  width:30px; height:30px; border-radius:8px;
  border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:.72em; font-weight:700; color:var(--text3);
  transition:all .2s; background:rgba(255,255,255,0.5);
}
.week-progress-bar .wdot.has-data { color:#fff; font-weight:700; }
.week-progress-bar .wcount {
  font-size:.78em; color:var(--text3); white-space:nowrap; margin-left:4px;
}

.day-strip {
  display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
  margin-bottom:16px;
}
.day-cell {
  text-align:center; padding:10px 6px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all .2s;
  background:rgba(255,255,255,var(--card-alpha));
  border:1px solid var(--border);
}
.day-cell:hover { border-color:var(--blue); }
.day-cell.today { border:2px solid var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.08); }
.day-cell.selected { background:rgba(239,244,255,var(--card-alpha)); border-color:var(--blue); }
.day-cell .day-name { font-size:.68em; color:var(--text2); margin-bottom:2px; }
.day-cell .day-date { font-size:.82em; font-weight:600; }
.day-cell .day-time { font-size:.66em; color:var(--text); margin-top:3px; font-weight:500; }

/* 热力格子的文字颜色 */
.day-cell.hl-1 .day-name, .day-cell.hl-1 .day-time,
.day-cell.hl-2 .day-name, .day-cell.hl-2 .day-time,
.day-cell.hl-3 .day-name, .day-cell.hl-3 .day-time { color: var(--text); }
.day-cell.hl-4 .day-name, .day-cell.hl-4 .day-date, .day-cell.hl-4 .day-time { color: #fff; }

/* ── Card ── */
.card {
  background:rgba(255,255,255,var(--card-alpha));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 22px; margin:12px 0;
  box-shadow:var(--shadow-sm);
}
.sec-title {
  font-size:.9em; font-weight:700; color:var(--text2);
  margin-bottom:12px; display:flex; align-items:center; gap:6px;
}

/* ── Buttons ── */
.btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:7px 16px; border:none; border-radius:var(--radius-sm);
  font-size:.82em; font-weight:600; cursor:pointer; transition:all .15s;
  font-family:inherit;
}
.btn-primary { background:var(--blue); color:#fff; }
.btn-primary:hover { opacity:.88; }
.btn-sm { padding:5px 12px; font-size:.76em; }

/* ── Summary ── */
.summary-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:12px;
}
.summary-item { text-align:center; padding:8px 4px; }
.summary-item .val { font-size:1.3em; font-weight:750; }
.summary-item .lbl { font-size:.68em; color:var(--text3); margin-top:2px; }

/* ── Subject bars ── */
.subj-row {
  display:flex; align-items:center; gap:10px; margin-bottom:5px; font-size:.82em;
}
.subj-row .subj-name { width:40px; font-weight:600; flex-shrink:0; }
.subj-row .subj-bar {
  flex:1; height:10px; background:var(--border);
  border-radius:5px; overflow:hidden;
}
.subj-row .subj-fill { height:100%; border-radius:5px; transition:width .4s; }
.subj-row .subj-time { width:64px; text-align:right; color:var(--text2); flex-shrink:0; }

/* ── Table ── */
.log-table { width:100%; border-collapse:collapse; font-size:.92em; font-variant-numeric:tabular-nums; }
.log-table th {
  text-align:left; padding:10px 14px; border-bottom:1px solid var(--border-strong);
  color:var(--text2); font-weight:600; font-size:.82em; letter-spacing:.04em;
}
.log-table td { padding:10px 14px; border-bottom:1px solid var(--border); border-right:1px solid var(--border); }
.log-table td:last-child, .log-table th:last-child { border-right:none; }
.log-table tr:last-child td { border-bottom:none; }
.log-table tbody tr { transition:background .15s; }
.log-table tbody tr:hover { background:rgba(37,99,235,.04); }
.log-table .col-num { color:var(--text3); font-size:.88em; width:32px; text-align:center; }
.log-table .col-time { font-family:"SF Mono","Cascadia Code","JetBrains Mono",monospace; font-size:.9em; letter-spacing:.02em; }
.log-table .col-dur { font-family:"SF Mono","Cascadia Code","JetBrains Mono",monospace; font-size:.9em; font-weight:600; color:var(--text); }
.log-table .col-subj { font-weight:650; font-size:.92em; }

/* ── Review card ── */
.review-card {
  background:rgba(239,244,255,var(--card-alpha));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 24px; margin:14px 0;
}
@media(prefers-color-scheme:dark){.review-card{background:rgba(26,39,64,var(--card-alpha))}}
.review-card .review-title {
  font-size:.88em; font-weight:700; color:var(--blue);
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.review-card .review-body { font-size:.9em; line-height:1.8; color:var(--text); white-space:pre-line; }
.review-meta { font-size:.72em; color:var(--text3); margin-top:10px; }

/* ── Empty / Loading ── */
.empty-state {
  text-align:center; padding:40px 20px; color:var(--text3);
  background:rgba(255,255,255,var(--card-alpha));
  border:1px solid var(--border); border-radius:var(--radius);
}
.empty-state .icon { font-size:2.5em; margin-bottom:10px; }
.loading { text-align:center; padding:30px; color:var(--text3); }

/* ── Heatmap legend ── */
.heat-legend {
  display:flex; align-items:center; gap:6px; margin-bottom:14px;
  font-size:.7em; color:var(--text2);
  background:rgba(255,255,255,var(--card-alpha));
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:8px 14px;
}
.heat-legend .swatch {
  width:16px; height:16px; border-radius:4px; border:1px solid var(--border);
  flex-shrink:0;
}
</style>
</head>
<body>

<!-- Week bar: nav + progress + today -->
<div class="week-progress-bar">
  <button class="week-nav-btn" onclick="navWeek(-1)" title="上一周">&lt;</button>
  <span class="week-label" id="week-label"></span>
  <button class="week-nav-btn" onclick="navWeek(1)" title="下一周">&gt;</button>
  <div class="wdots" id="week-progress-dots"></div>
  <span class="wcount" id="week-progress-count"></span>
  <button class="week-today-btn" onclick="goToday()">今天</button>
</div>

<div class="day-strip" id="day-strip"></div>

<div class="heat-legend" id="heat-legend">
  <span>学习时长</span>
  <span class="swatch" style="background:rgba(255,255,255,var(--card-alpha));"></span><span>0</span>
  <span class="swatch" style="background:rgba(232,240,254,var(--card-alpha));"></span><span>&lt;1h</span>
  <span class="swatch" style="background:rgba(189,215,245,var(--card-alpha));"></span><span>&lt;3h</span>
  <span class="swatch" style="background:rgba(122,169,229,var(--card-alpha));"></span><span>&lt;6h</span>
  <span class="swatch" style="background:var(--blue);"></span><span>≥6h</span>
</div>

<div id="content">
  <div class="loading">加载中...</div>
</div>

<script>
var API = 'http://localhost:8765';
var SUBJECT_NAMES = {math:'数学', cs:'408', eng:'英语', pol:'政治'};
var SUBJECT_HEX = {math:'#2563eb', cs:'#7c3aed', eng:'#ea580c', pol:'#f87171'};

// ── Heatmap: 学习时长的5级热力色 ──
function heatmapLevel(seconds) {
  if (!seconds || seconds <= 0) return 0;
  if (seconds < 3600) return 1;      // <1h
  if (seconds < 10800) return 2;     // <3h
  if (seconds < 21600) return 3;     // <6h
  return 4;                           // ≥6h
}
function heatmapInline(seconds) {
  var lv = heatmapLevel(seconds);
  if (lv === 0) return '';
  var fills  = ['', 'rgba(232,240,254,var(--card-alpha))', 'rgba(189,215,245,var(--card-alpha))', 'rgba(122,169,229,var(--card-alpha))', 'var(--blue)'];
  var edges  = ['', 'rgba(207,221,240,var(--card-alpha))', 'rgba(161,194,229,var(--card-alpha))', 'rgba(91,141,210,var(--card-alpha))', 'var(--blue)'];
  var style = 'background:' + fills[lv] + '!important;';
  style += 'border-color:' + edges[lv] + '!important;';
  return style;
}

// Score → color mapping for week dots
var SCORE_COLORS = {S:'#f59e0b', A:'#16a34a', B:'#2563eb', C:'#ea580c', D:'#dc2626'};
function gradeColor(grade) {
  if (!grade) return null;
  return SCORE_COLORS[grade.charAt(0)] || null;
}

// ── Week navigation ──
var weekMonday = getMonday(new Date());
var selectedDate = new Date().toISOString().slice(0,10);
var dailyCache = {};    // date -> {total_time, segments_count}
var reviewCache = {};   // date -> {score, grade}

function getMonday(d) {
  var dt = new Date(d); dt.setDate(dt.getDate() - ((dt.getDay()+6)%7));
  dt.setHours(0,0,0,0); return dt;
}
function fmtDate(d) {
  var m=d.getMonth()+1, day=d.getDate();
  return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day;
}

async function navWeek(dir) {
  weekMonday.setDate(weekMonday.getDate() + dir*7);
  renderWeek();
  await preloadWeekStats();
  renderWeek();
}

async function goToday() {
  weekMonday = getMonday(new Date());
  selectedDate = new Date().toISOString().slice(0,10);
  renderWeek();
  await preloadWeekStats();
  renderWeek();
  loadDay(selectedDate);
}

function renderWeekStrip() {
  var today = fmtDate(new Date());
  var container = document.getElementById('day-strip');
  var dayNames = ['周一','周二','周三','周四','周五','周六','周日'];
  var html = '';

  for (var i = 0; i < 7; i++) {
    var d = new Date(weekMonday); d.setDate(d.getDate() + i);
    var ds = fmtDate(d);
    var isToday = ds === today;
    var isSel = ds === selectedDate;
    var cls = 'day-cell';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';

    var timeStr = '';
    var heatStyle = '';
    var heatClass = '';
    if (dailyCache[ds] && dailyCache[ds].total_time > 0) {
      timeStr = fmtTimeShort(dailyCache[ds].total_time);
      heatStyle = heatmapInline(dailyCache[ds].total_time);
      heatClass = ' hl-' + heatmapLevel(dailyCache[ds].total_time);
    } else if (dailyCache[ds]) {
      timeStr = '—';
    }

    html += '<div class="'+cls+heatClass+'" onclick="selectDay(\''+ds+'\')" style="'+heatStyle+'">';
    html += '<div class="day-name">'+dayNames[i]+'</div>';
    html += '<div class="day-date">'+(d.getMonth()+1)+'/'+d.getDate()+'</div>';
    html += '<div class="day-time">'+timeStr+'</div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderWeekProgress() {
  var container = document.getElementById('week-progress-dots');
  var dayNames = ['一','二','三','四','五','六','日'];
  var html = '';
  var filled = 0;

  for (var i = 0; i < 7; i++) {
    var d = new Date(weekMonday); d.setDate(d.getDate() + i);
    var ds = fmtDate(d);
    var data = dailyCache[ds];
    var review = reviewCache[ds];
    var hasData = data && data.total_time > 0;

    var bg = '';
    var border = '';
    var color = 'var(--text3)';

    if (hasData) {
      filled++;
      if (review && review.grade) {
        var gc = gradeColor(review.grade);
        bg = gc; border = gc; color = '#fff';
      } else {
        bg = 'var(--blue)'; border = 'var(--blue)'; color = '#fff';
      }
    }

    var style = '';
    if (bg) style += 'background:'+bg+';border-color:'+border+';color:'+color+';';
    html += '<div class="wdot'+(hasData?' has-data':'')+'" style="'+style+'" title="'+ds+'">'+dayNames[i]+'</div>';
  }

  container.innerHTML = html;
  document.getElementById('week-progress-count').textContent = filled+'/7 天';
}

function renderWeek() {
  renderWeekStrip();
  renderWeekProgress();
  // Update week label
  var sun = new Date(weekMonday); sun.setDate(sun.getDate()+6);
  var label = (weekMonday.getMonth()+1)+'/'+weekMonday.getDate()+' - '+(sun.getMonth()+1)+'/'+sun.getDate();
  document.getElementById('week-label').textContent = '本周 ' + label;
}

function selectDay(ds) {
  selectedDate = ds;
  renderWeekStrip();
  renderWeekProgress();
  loadDay(ds);
}

// ── API ──
async function apiCall(path) {
  try {
    var res = await fetch(API + path);
    return await res.json();
  } catch(e) { return null; }
}

// ── Preload week stats (background, skips today) ──
async function preloadWeekStats() {
  var today = new Date().toISOString().slice(0,10);
  var urls = [], dateMap = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(weekMonday); d.setDate(d.getDate() + i);
    var ds = fmtDate(d);
    if (ds === today) continue;  // already loaded
    urls.push('/api/stats/daily?date=' + ds);
    urls.push('/api/stats/review?date=' + ds);
    dateMap.push(ds); dateMap.push(ds);
  }
  if (!urls.length) return;
  var results = await Promise.all(urls.map(function(u) {
    return fetch(API + u).then(function(r) { return r.json(); }).catch(function() { return null; });
  }));
  for (var i = 0; i < results.length; i += 2) {
    var ds = dateMap[i];
    var daily = results[i], review = results[i + 1];
    if (daily && daily.total_time !== undefined) {
      dailyCache[ds] = { total_time: daily.total_time || 0, segments_count: (daily.segments||[]).length };
    } else {
      dailyCache[ds] = { total_time: 0, segments_count: 0 };
    }
    if (review && review.text) {
      reviewCache[ds] = { score: review.score, grade: review.grade };
    }
  }
}

// ── Load & render ──
async function loadDay(ds) {
  if (!ds) ds = selectedDate;
  selectedDate = ds;
  var container = document.getElementById('content');
  container.innerHTML = '<div class="loading">加载中...</div>';

  var results = await Promise.all([
    fetch(API + '/api/stats/daily?date=' + ds).then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch(API + '/api/stats/review?date=' + ds).then(function(r) { return r.json(); }).catch(function() { return null; })
  ]);
  var daily = results[0];
  var review = results[1];
  if (!review || !review.text) review = null;

  // 更新缓存（驱动日期格子的热力色）
  if (daily && daily.total_time !== undefined) {
    dailyCache[ds] = { total_time: daily.total_time || 0, segments_count: (daily.segments||[]).length };
  } else if (!dailyCache[ds]) {
    dailyCache[ds] = { total_time: 0, segments_count: 0 };
  }
  if (review && review.text) {
    reviewCache[ds] = { score: review.score, grade: review.grade };
  }
  renderWeekProgress();
  renderWeekStrip();

  render(ds, daily, review);
}

function render(date, daily, review) {
  var container = document.getElementById('content');
  var hasData = daily && daily.segments && daily.segments.length > 0;

  if (!hasData && !review) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>'+date+' 暂无学习记录</div><div style="font-size:.82em;color:var(--text3);margin-top:4px;">开始番茄钟专注后会自动记录</div></div>';
    return;
  }

  var html = '';

  if (hasData) {
    var segs = daily.segments;
    var totalTime = daily.total_time || 0;
    var totalPomos = daily.pomodoros || 0;

    // Subject distribution
    var subjDist = {};
    segs.forEach(function(s) {
      var subj = s.subject || 'other';
      if (!subjDist[subj]) subjDist[subj] = {time:0, segs:0};
      subjDist[subj].time += s.duration;
      subjDist[subj].segs += 1;
    });
    var maxDist = 0;
    Object.values(subjDist).forEach(function(s){ if (s.time > maxDist) maxDist = s.time; });

    // ── Summary card ──
    html += '<div class="card">';
    html += '<div class="sec-title">📊 ' + date + ' 学习汇总</div>';
    html += '<div class="summary-grid">';
    html += '<div class="summary-item"><div class="val" style="color:var(--blue);">'+fmtTimeShort(totalTime)+'</div><div class="lbl">总时长</div></div>';
    html += '<div class="summary-item"><div class="val">'+segs.length+'</div><div class="lbl">学习段数</div></div>';
    html += '<div class="summary-item"><div class="val" style="color:var(--green);">'+totalPomos+'</div><div class="lbl">番茄数</div></div>';
    html += '<div class="summary-item"><div class="val" style="color:var(--orange);">'+(totalTime>0&&segs.length>0?fmtTimeShort(Math.round(totalTime/segs.length)):'—')+'</div><div class="lbl">平均每段</div></div>';
    html += '</div>';

    // Subject bars
    if (Object.keys(subjDist).length > 0) {
      html += '<div style="margin-top:16px;">';
      var keys = Object.keys(subjDist);
      keys.sort(function(a,b){return subjDist[b].time - subjDist[a].time;});
      keys.forEach(function(k) {
        var name = SUBJECT_NAMES[k] || '其他';
        var color = SUBJECT_HEX[k] || '#888';
        var w = maxDist > 0 ? Math.max(subjDist[k].time / maxDist * 100, 3) : 0;
        html += '<div class="subj-row">';
        html += '<span class="subj-name" style="color:'+color+';">'+name+'</span>';
        html += '<div class="subj-bar"><div class="subj-fill" style="width:'+w+'%;background:'+color+';"></div></div>';
        html += '<span class="subj-time">'+fmtTimeShort(subjDist[k].time)+' ×'+subjDist[k].segs+'段</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';

    // ── Segments table ──
    html += '<div class="card">';
    html += '<div class="sec-title">📋 学习时段</div>';
    html += '<div style="overflow-x:auto;">';
    html += '<table class="log-table"><thead><tr>';
    html += '<th class="col-num">#</th><th class="col-time">开始</th><th class="col-time">结束</th><th class="col-dur">时长</th><th class="col-subj">科目</th>';
    html += '</tr></thead><tbody>';

    segs.forEach(function(s,i) {
      var name = SUBJECT_NAMES[s.subject] || '—';
      var color = SUBJECT_HEX[s.subject] || 'var(--text2)';
      html += '<tr>';
      html += '<td class="col-num">'+(i+1)+'</td>';
      html += '<td class="col-time">'+(s.start||'--')+'</td>';
      html += '<td class="col-time">'+(s.end||'--')+'</td>';
      html += '<td class="col-dur">'+fmtDuration(s.duration||0)+'</td>';
      html += '<td class="col-subj" style="color:'+color+';">'+name+'</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div></div>';
  }

  // ── Expert review ──
  if (review) {
    var scoreHTML = '';
    if (review.score !== undefined) {
      var gc = '#fbbf24';
      var g = review.grade || '';
      if (g.charAt(0)==='S') gc='#f59e0b';
      else if (g.charAt(0)==='A') gc='#16a34a';
      else if (g.charAt(0)==='B') gc='#2563eb';
      else if (g.charAt(0)==='C'||g.charAt(0)==='D') gc='#dc2626';
      scoreHTML = '<span style="margin-left:10px;font-size:1.4em;font-weight:800;color:'+gc+';">'+review.score+'</span>' +
        '<span style="font-size:.72em;color:'+gc+';opacity:.6;margin-left:2px;">分 / '+g+'</span>';
    }
    html += '<div class="review-card">';
    html += '<div class="review-title">🧠 考研教练点评' + scoreHTML + '</div>';
    html += '<div class="review-body">'+escHtml(review.text||'')+'</div>';
    html += '<div class="review-meta">生成于 '+(review.generatedAt||'')+' · 基于 '+(review.source||'')+' 的学习数据</div>';
    html += '</div>';
  } else if (hasData) {
    html += '<div class="card" style="text-align:center;padding:24px;color:var(--text3);">';
    html += '<div style="font-size:1.5em;margin-bottom:6px;">🧠</div>';
    html += '<div style="font-size:.88em;">专家评价将在次日早上 8:30 自动生成，也可以点击专注工具右上角按钮手动生成</div>';
    html += '</div>';
  }

  container.innerHTML = html;
}

// ── Helpers ──
function fmtDuration(s) {
  var h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  if (h > 0) return h + 'h ' + m + 'min';
  return m + 'min';
}
function fmtTimeShort(s) {
  var h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  if (h > 0) return h + 'h' + m + 'm';
  return m + 'm';
}
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──
(async function init() {
  // 1. 立刻渲染空壳（周导航 + 空进度圆点）
  renderWeek();

  // 2. 马上加载今天的数据，不等待本周其他天
  var today = selectedDate;
  var results = await Promise.all([
    fetch(API + '/api/stats/daily?date=' + today).then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch(API + '/api/stats/review?date=' + today).then(function(r) { return r.json(); }).catch(function() { return null; })
  ]);
  var daily = results[0], review = results[1];
  if (!review || !review.text) review = null;

  // 缓存今天数据 + 立即更新今天圆点
  if (daily && daily.total_time !== undefined) {
    dailyCache[today] = { total_time: daily.total_time || 0, segments_count: (daily.segments||[]).length };
  } else {
    dailyCache[today] = { total_time: 0, segments_count: 0 };
  }
  if (review && review.text) {
    reviewCache[today] = { score: review.score, grade: review.grade };
  }
  renderWeekProgress();
  render(today, daily, review);

  // 3. 后台慢慢加载本周其余6天，完成后更新圆点
  preloadWeekStats().then(function() { renderWeekProgress(); });
})();
</script>



<script>
/* kaoyan-alpha: complete card coverage */
(function(){
  var styleEl = document.getElementById('kaoyan-dyn-style');
  if(!styleEl){
    styleEl = document.createElement('style');
    styleEl.id = 'kaoyan-dyn-style';
    document.head.appendChild(styleEl);
  }
  function update(a){
    document.documentElement.style.setProperty('--card-alpha',a);
    styleEl.textContent = '.card,.form-card,.ver,.subj,.alloc,.detail-card,.fact-strip,.tl-panel,.str-panel,.prob,.sig-panel,.step-panel,.trig-panel,.pledge-panel,.day-cell,.history-item,.ban-item,.summary-card,.week-row,.stats-bar,.encourage-box,.header-bar,.header-card,.zone-title-card,.stats,.week-nav-btn,.empty-state,.review-card,.week-progress-bar{background:rgba(255,255,255,'+a+')!important}.day-dot,.day-selector .day-dot{background:rgba(255,255,255,'+a+')!important}@media(prefers-color-scheme:dark){.card,.form-card,.ver,.subj,.alloc,.detail-card,.fact-strip,.tl-panel,.str-panel,.prob,.sig-panel,.step-panel,.trig-panel,.pledge-panel,.day-cell,.history-item,.ban-item,.summary-card,.week-row,.stats-bar,.encourage-box,.header-bar,.header-card,.zone-title-card,.stats,.week-nav-btn,.empty-state,.review-card,.week-progress-bar{background:rgba(36,35,31,'+a+')!important}}';
  }
  update(0.92);
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='kaoyan-alpha') update(e.data.value);
  });
  try{window.parent.postMessage({type:'kaoyan-ready'},'*');}catch(e){}
})();
</script>
