<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>趋势图表</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --card-alpha:0.92;
  --bg: #fafaf8; --text: #1c1b18; --text2: #5f5b55; --text3: #8b857d;
  --blue: #2563eb; --blue-bg: #eff4ff; 
  --border: #e7e4de; --radius: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.05);
  --card-alpha: 0.92;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:transparent}body{
  font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  background:transparent; color:var(--text); padding:10px 14px 14px;
}
.card {
  background:rgba(255,255,255,var(--card-alpha));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 20px; margin:8px 0;
  box-shadow:var(--shadow-sm);
}
.sec-title {
  font-size:1.1em; font-weight:750; margin-bottom:12px;
}
.chart-container {
  position: relative; height: 520px; width: 100%;
}
.loading { text-align:center; padding:40px; color:var(--text3); }

/* ── Range buttons ── */
.range-bar {
  display:inline-flex; gap:2px; margin-bottom:14px;
  border:1px solid var(--border); border-radius:8px;
  overflow:hidden;
}
.range-btn {
  padding:5px 16px; border:none; background:transparent;
  font-size:.78em; color:var(--text2); cursor:pointer;
  font-family:inherit; transition:all .15s;
  border-right:1px solid var(--border);
}
.range-btn:last-child { border-right:none; }
.range-btn:hover { background:var(--blue-bg); color:var(--blue); }
.range-btn.active {
  background:var(--blue); color:#fff;
}

/* ── Navigation bar ── */
.nav-bar {
  display:none; align-items:center; gap:6px; margin-bottom:14px;
  font-size:.82em; color:var(--text2);
}
.nav-bar.visible { display:inline-flex; }
.nav-btn {
  padding:4px 10px; border:1px solid var(--border);
  background:transparent; color:var(--text2);
  border-radius:6px; cursor:pointer; font-family:inherit;
  font-size:.85em; transition:all .15s;
  line-height:1.4;
}
.nav-btn:hover { background:var(--blue-bg); color:var(--blue); border-color:var(--blue); }
.nav-btn:active { transform:scale(0.95); }
.nav-label {
  min-width:120px; text-align:center;
  font-weight:600; color:var(--text);
  padding:4px 8px;
}
.nav-today {
  padding:4px 12px; border:1px solid var(--border);
  background:var(--blue-bg); color:var(--blue);
  border-radius:6px; cursor:pointer; font-family:inherit;
  font-size:.82em; transition:all .15s;
  line-height:1.4; font-weight:500;
}
.nav-today:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
</style>
</head>
<body>

<div class="card">
  <div class="sec-title">📈 学习时长趋势</div>
  <div class="range-bar" id="range-bar">
    <button class="range-btn" data-mode="week">周</button>
    <button class="range-btn active" data-mode="14d">14天</button>
    <button class="range-btn" data-mode="month">月</button>
    <button class="range-btn" data-mode="year">年</button>
  </div>
  <div class="nav-bar" id="nav-bar">
    <button class="nav-btn" data-dir="-1" title="上一周/月">&#9664;</button>
    <span class="nav-label" id="nav-label"></span>
    <button class="nav-btn" data-dir="1" title="下一周/月">&#9654;</button>
    <button class="nav-today" id="nav-today">今天</button>
  </div>
  <div id="loading" class="loading">正在加载数据...</div>
  <div class="chart-container" id="chart-wrapper" style="display:none;">
    <canvas id="trendChart"></canvas>
  </div>
</div>

<script>
var API = 'http://localhost:8765';
var SUBJECT_NAMES = { total:'总时长', math:'数学', cs:'408', eng:'英语', pol:'政治', sport:'运动' };
var SUBJECT_COLORS = { total:'#10b981', math:'#2563eb', cs:'#7c3aed', eng:'#ea580c', pol:'#dc2626', sport:'#16a34a' };
var SUBJ_KEYS = ['total','math','cs','eng','pol','sport'];

var currentMode = '14d';
var weekOffset = 0;       // 0=本周, -1=上周, 1=下周...
var viewYear = null;      // 月模式下的年份
var viewMonth = null;     // 月模式下的月份 (0-indexed)
var cachedLogs = null;
var cachedReviews = null;
var cachedWeights = null;
var chartInstance = null;

// ── Chart config from parent settings ──
var CHART_DEFAULTS = {
  y: { modeMax: { week:null, '14d':null, month:null, year:null }, stepSize: null, precision: 'auto' },
  y1: { min: 0, max: 100, stepSize: 20 },
  y2: { min: null, max: null, stepSize: null, precision: 'auto' },
  series: {
    total:  { visible:true, tension:0.30, borderWidth:3, dash:'5,5', pointRadius:5, fill:true,  color:null },
    math:   { visible:true, tension:0.30, borderWidth:2, dash:'',    pointRadius:4, fill:false, color:null },
    cs:     { visible:true, tension:0.30, borderWidth:2, dash:'',    pointRadius:4, fill:false, color:null },
    eng:    { visible:true, tension:0.30, borderWidth:2, dash:'',    pointRadius:4, fill:false, color:null },
    pol:    { visible:true, tension:0.30, borderWidth:2, dash:'',    pointRadius:4, fill:false, color:null },
    sport:  { visible:true, tension:0.30, borderWidth:2, dash:'',    pointRadius:4, fill:false, color:null },
    score:  { visible:true, tension:0.30, borderWidth:2.5,dash:'',    pointRadius:5, fill:false, color:null },
    weight: { visible:true, tension:0.30, borderWidth:2, dash:'8,4',  pointRadius:4, fill:false, color:null }
  }
};

function deepMergeChart(base, override) {
  for (var k in override) {
    if (override[k] && typeof override[k] === 'object' && !Array.isArray(override[k])) {
      if (!base[k]) base[k] = {};
      deepMergeChart(base[k], override[k]);
    } else { base[k] = override[k]; }
  }
  return base;
}

var parentChartConfig = null;

function loadConfig() {
  var cfgSource = parentChartConfig;
  if (!cfgSource) {
    try {
      var raw = localStorage.getItem('kaoyan_chart_config');
      if (raw) cfgSource = JSON.parse(raw);
    } catch(e) {}
  }
  if (cfgSource) {
    return deepMergeChart(JSON.parse(JSON.stringify(CHART_DEFAULTS)), cfgSource);
  }
  return JSON.parse(JSON.stringify(CHART_DEFAULTS));
}

function parseDash(dashStr) {
  if (!dashStr || dashStr === '') return [];
  return dashStr.split(',').map(function(v){ return parseInt(v)||0; });
}

function getTickCallback(precision) {
  if (precision === 'auto') return undefined;
  var decimals = parseFloat(precision);
  if (decimals === 0.01) return function(v) { return v.toFixed(2); };
  if (decimals === 0.1) return function(v) { return v.toFixed(1); };
  if (decimals === 0.5) return function(v) { return (Math.round(v*2)/2).toFixed(1); };
  return function(v) { return Math.round(v).toString(); };
}

function hexToRgba(hex, alpha) {
  if (!hex || typeof hex !== 'string') return hex;
  if (hex.startsWith('rgba') || hex.startsWith('rgb(')) {
    var m = hex.match(/[\d.]+/g);
    if (m && m.length >= 3) return 'rgba(' + m[0] + ',' + m[1] + ',' + m[2] + ',' + alpha + ')';
  }
  if (hex.startsWith('#')) {
    var h = hex.replace('#','');
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    if (h.length === 6) {
      var r = parseInt(h.slice(0,2), 16);
      var g = parseInt(h.slice(2,4), 16);
      var b = parseInt(h.slice(4,6), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }
  }
  // Fallback: 8-digit hex alpha
  return hex + (alpha < 0.1 ? '1A' : alpha < 0.2 ? '33' : '4D');
}

// ── Mode switch ──
document.getElementById('range-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('.range-btn');
  if (!btn || btn.classList.contains('active')) return;
  document.querySelectorAll('.range-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentMode = btn.dataset.mode;

  // Reset offsets when switching modes
  weekOffset = 0;
  viewYear = null;
  viewMonth = null;

  toggleNavBar();
  updateNavLabel();
  if (cachedLogs) renderChart();
});

// ── Navigation ──
document.getElementById('nav-bar').addEventListener('click', function(e) {
  var navBtn = e.target.closest('.nav-btn');
  if (navBtn) {
    var dir = parseInt(navBtn.dataset.dir);
    navigate(dir);
    return;
  }
  var todayBtn = e.target.closest('.nav-today');
  if (todayBtn) {
    goToday();
    return;
  }
});

function navigate(dir) {
  if (currentMode === 'week') {
    weekOffset += dir;
    // Stop at earliest week with data
    var allDates = Object.keys(cachedLogs).sort();
    if (allDates.length > 0) {
      var now = new Date();
      var mon = getMonday(now);
      mon.setDate(mon.getDate() + weekOffset * 7);
      var firstDataDate = allDates[0];
      if (fmtDate(mon) < firstDataDate && dir < 0) {
        weekOffset -= dir; // undo
        return;
      }
    }
  } else if (currentMode === 'month') {
    var now = new Date();
    if (viewMonth === null) viewMonth = now.getMonth();
    if (viewYear === null) viewYear = now.getFullYear();
    var m = viewMonth + dir;
    var y = viewYear;
    if (m < 0) { m = 11; y--; }
    if (m > 11) { m = 0; y++; }
    viewMonth = m;
    viewYear = y;
  }
  updateNavLabel();
  renderChart();
}

function goToday() {
  weekOffset = 0;
  viewYear = null;
  viewMonth = null;
  updateNavLabel();
  renderChart();
}

function toggleNavBar() {
  var nav = document.getElementById('nav-bar');
  if (currentMode === 'week' || currentMode === 'month') {
    nav.classList.add('visible');
  } else {
    nav.classList.remove('visible');
  }
}

function updateNavLabel() {
  var navToday = document.getElementById('nav-today');
  var navLabel = document.getElementById('nav-label');

  if (currentMode === 'week') {
    var now = new Date();
    var mon = getMonday(now);
    mon.setDate(mon.getDate() + weekOffset * 7);
    var sun = new Date(mon);
    sun.setDate(sun.getDate() + 6);
    navLabel.textContent = fmtShort(mon) + ' - ' + fmtShort(sun);
    navToday.textContent = weekOffset === 0 ? '今天' : '本周';
  } else if (currentMode === 'month') {
    var y = viewYear !== null ? viewYear : new Date().getFullYear();
    var m = viewMonth !== null ? viewMonth : new Date().getMonth();
    navLabel.textContent = y + '年' + (m + 1) + '月';
    var now = new Date();
    var isCurrent = (y === now.getFullYear() && m === now.getMonth());
    navToday.textContent = isCurrent ? '本月' : '本月';
  }
}

// ── Data ──
async function loadData() {
  try {
    var res = await fetch(API + '/api/stats');
    var data = await res.json();
    cachedLogs = data.daily_logs || {};
    cachedReviews = data.reviews || {};
    cachedWeights = data.weight_logs || {};
    toggleNavBar();
    updateNavLabel();
    renderChart();
  } catch(e) {
    document.getElementById('loading').textContent = '数据加载失败，请检查专注工具后台是否运行。';
  }
}

function fmtDate(d) {
  var m = d.getMonth()+1, day = d.getDate();
  return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day;
}

function fmtShort(d) {
  var m = d.getMonth()+1, day = d.getDate();
  return (m<10?'0':'')+m+'/'+(day<10?'0':'')+day;
}

function getMonday(d) {
  var dt = new Date(d);
  dt.setDate(dt.getDate() - ((dt.getDay()+6)%7));
  dt.setHours(0,0,0,0);
  return dt;
}

function getMonthDates(year, month) {
  var dates = [];
  var lastDay = new Date(year, month+1, 0).getDate();
  for (var d = 1; d <= lastDay; d++) {
    var m = month+1;
    dates.push(year+'-'+(m<10?'0':'')+m+'-'+(d<10?'0':'')+d);
  }
  return dates;
}

function avgNonEmpty(arr) {
  var vals = arr.filter(function(v){ return v !== null; });
  if (vals.length === 0) return null;
  return parseFloat((vals.reduce(function(a,b){return a+b;},0) / vals.length).toFixed(1));
}

// ── Aggregate ──
function aggregateDaily(logs, dates) {
  var ds = { total:[], math:[], cs:[], eng:[], pol:[], sport:[] };

  dates.forEach(function(date) {
    var day = logs[date];
    if (day) {
      var segs = day.segments || [];
      var sum = { math:0, cs:0, eng:0, pol:0, sport:0 };
      segs.forEach(function(s) {
        if (sum[s.subject] !== undefined) sum[s.subject] += (s.duration||0);
      });
      SUBJ_KEYS.forEach(function(k) {
        if (k === 'total') ds[k].push(parseFloat(((day.total_time||0)/3600).toFixed(2)));
        else ds[k].push(parseFloat((sum[k]/3600).toFixed(2)));
      });
    } else {
      SUBJ_KEYS.forEach(function(k) { ds[k].push(null); });
    }
  });

  return { labels: dates.map(function(d){ return d.slice(5); }), datasets: ds };
}

function aggregateWeekly(logs, allDates) {
  var weeks = {};
  allDates.forEach(function(date) {
    var d = new Date(date + 'T00:00:00');
    var day = d.getDay() || 7;
    var mon = new Date(d);
    mon.setDate(d.getDate() - day + 1);
    var wk = fmtDate(mon);
    if (!weeks[wk]) weeks[wk] = { math:0, cs:0, eng:0, pol:0, sport:0, total:0, end: date };
    var dayData = logs[date];
    var segs = dayData.segments || [];
    weeks[wk].total += (dayData.total_time||0);
    weeks[wk].end = date;
    segs.forEach(function(s) {
      if (weeks[wk][s.subject] !== undefined) weeks[wk][s.subject] += (s.duration||0);
    });
  });

  var sorted = Object.keys(weeks).sort();
  if (sorted.length > 26) sorted = sorted.slice(-26);

  var ds = { total:[], math:[], cs:[], eng:[], pol:[], sport:[] };
  var labels = [];
  sorted.forEach(function(wk) {
    var w = weeks[wk];
    var endD = new Date(w.end + 'T00:00:00');
    labels.push(wk.slice(5) + '-' + (endD.getMonth()+1)+'/'+endD.getDate());
    SUBJ_KEYS.forEach(function(k) {
      ds[k].push(parseFloat((w[k]/3600).toFixed(1)));
    });
  });

  return { labels: labels, datasets: ds };
}

function aggregateMonthly(logs, allDates) {
  var months = {};
  allDates.forEach(function(date) {
    var mk = date.slice(0,7);
    if (!months[mk]) months[mk] = { math:0, cs:0, eng:0, pol:0, sport:0, total:0 };
    var dayData = logs[date];
    var segs = dayData.segments || [];
    months[mk].total += (dayData.total_time||0);
    segs.forEach(function(s) {
      if (months[mk][s.subject] !== undefined) months[mk][s.subject] += (s.duration||0);
    });
  });

  var sorted = Object.keys(months).sort();
  var ds = { total:[], math:[], cs:[], eng:[], pol:[], sport:[] };
  var labels = [];
  sorted.forEach(function(mk) {
    labels.push(parseInt(mk.slice(5))+'月');
    SUBJ_KEYS.forEach(function(k) {
      ds[k].push(parseFloat((months[mk][k]/3600).toFixed(1)));
    });
  });

  return { labels: labels, datasets: ds };
}

// ── Render ──
function renderChart() {
  var allDates = Object.keys(cachedLogs).sort();
  var result, scoreData, dates;

  if (currentMode === 'week') {
    var now = new Date();
    var mon = getMonday(now);
    mon.setDate(mon.getDate() + weekOffset * 7);
    dates = [];
    for (var i = 0; i < 7; i++) {
      var d = new Date(mon);
      d.setDate(d.getDate() + i);
      dates.push(fmtDate(d));
    }
    result = aggregateDaily(cachedLogs, dates);

    scoreData = dates.map(function(date) {
      var r = cachedReviews[date];
      return (r && typeof r.score === 'number') ? r.score : null;
    });

  } else if (currentMode === '14d') {
    dates = allDates.length > 14 ? allDates.slice(-14) : allDates;
    result = aggregateDaily(cachedLogs, dates);

    scoreData = dates.map(function(date) {
      var r = cachedReviews[date];
      return (r && typeof r.score === 'number') ? r.score : null;
    });

  } else if (currentMode === 'month') {
    var y = viewYear !== null ? viewYear : new Date().getFullYear();
    var m = viewMonth !== null ? viewMonth : new Date().getMonth();
    dates = getMonthDates(y, m);
    result = aggregateDaily(cachedLogs, dates);

    scoreData = dates.map(function(date) {
      var r = cachedReviews[date];
      return (r && typeof r.score === 'number') ? r.score : null;
    });

  } else if (currentMode === 'year') {
    result = aggregateMonthly(cachedLogs, allDates);

    var monthScores = {};
    allDates.forEach(function(date) {
      var mk = date.slice(0, 7);
      var r = cachedReviews[date];
      if (r && typeof r.score === 'number') {
        if (!monthScores[mk]) monthScores[mk] = [];
        monthScores[mk].push(r.score);
      }
    });
    scoreData = Object.keys(monthScores).sort().map(function(mk) {
      return avgNonEmpty(monthScores[mk]);
    });
  }

  if (!result || result.labels.length === 0) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = '暂无学习数据。';
    document.getElementById('chart-wrapper').style.display = 'none';
    return;
  }

  // Weight data for dates (with inheritance for daily modes)
  var weightData = null;
  if (dates && cachedWeights) {
    var today = new Date().toISOString().slice(0,10);
    var weightDates = Object.keys(cachedWeights).sort();
    weightData = dates.map(function(date) {
      if (cachedWeights[date] !== undefined && typeof cachedWeights[date] === 'number') return cachedWeights[date];
      // Before tracking start or future: null
      if (date < today || date > today) return null;
      // Today onwards: inherit from previous recorded date
      var latest = null;
      for (var i = 0; i < weightDates.length; i++) {
        if (weightDates[i] <= date && typeof cachedWeights[weightDates[i]] === 'number') latest = cachedWeights[weightDates[i]];
      }
      return latest;
    });
  }

  var chartCfg = loadConfig();
  var chartDatasets = SUBJ_KEYS.map(function(key) {
    var isTotal = key === 'total';
    var sc = chartCfg.series[key];
    if (!sc || !sc.visible) return null;
    var clr = (sc.color && sc.color !== 'null') ? sc.color : SUBJECT_COLORS[key];
    return {
      label: SUBJECT_NAMES[key],
      data: result.datasets[key],
      borderColor: clr,
      backgroundColor: clr + (sc.fill ? '15' : '20'),
      borderWidth: sc.borderWidth,
      borderDash: parseDash(sc.dash),
      pointRadius: sc.pointRadius,
      pointHoverRadius: sc.pointRadius + 2,
      tension: sc.tension,
      fill: sc.fill
    };
  }).filter(function(ds) { return ds !== null && ds.data.some(function(v){ return v > 0; }); });

  var hasScores = scoreData && scoreData.some(function(v){ return v !== null; });
  var scScore = chartCfg.series.score;
  if (hasScores && scScore && scScore.visible) {
    var scoreClr = (scScore.color && scScore.color !== 'null') ? scScore.color : '#f59e0b';
    chartDatasets.push({
      label: 'AI评分',
      data: scoreData,
      borderColor: scoreClr,
      backgroundColor: hexToRgba(scoreClr, 0.10),
      borderWidth: scScore.borderWidth,
      borderDash: parseDash(scScore.dash),
      pointRadius: scScore.pointRadius,
      pointHoverRadius: scScore.pointRadius + 2,
      pointStyle: 'rectRounded',
      tension: scScore.tension,
      fill: scScore.fill,
      spanGaps: true,
      yAxisID: 'y1'
    });
  }

  // Weight dataset (right y-axis, kg)
  var hasWeight = weightData && weightData.some(function(v){ return v !== null; });
  var scWeight = chartCfg.series.weight;
  if (hasWeight && scWeight && scWeight.visible) {
    var wtClr = (scWeight.color && scWeight.color !== 'null') ? scWeight.color : '#22d3ee';
    chartDatasets.push({
      label: '体重 (kg)',
      data: weightData,
      borderColor: wtClr,
      backgroundColor: hexToRgba(wtClr, 0.08),
      borderWidth: scWeight.borderWidth,
      borderDash: parseDash(scWeight.dash),
      pointRadius: scWeight.pointRadius,
      pointHoverRadius: scWeight.pointRadius + 2,
      pointStyle: 'triangle',
      tension: scWeight.tension,
      fill: scWeight.fill,
      spanGaps: true,
      yAxisID: 'y2'
    });
  }

  if (chartDatasets.length === 0) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = '所选范围暂无学习数据。';
    document.getElementById('chart-wrapper').style.display = 'none';
    return;
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('chart-wrapper').style.display = 'block';

  // Build scales with config
  var yScale = {
    beginAtZero: true,
    title: { display: true, text: '学习时长 (小时)' },
    grid: { color: 'rgba(0,0,0,0.05)' }
  };
  var yMax = chartCfg.y.modeMax[currentMode];
  if (yMax !== null && yMax !== undefined) yScale.max = yMax;
  if (chartCfg.y.stepSize !== null && chartCfg.y.stepSize !== undefined) yScale.ticks = { stepSize: chartCfg.y.stepSize };
  else yScale.ticks = {};
  var yTickCb = getTickCallback(chartCfg.y.precision);
  if (yTickCb) yScale.ticks.callback = yTickCb;

  var y1Scale = {
    position: 'right',
    beginAtZero: false,
    min: chartCfg.y1.min,
    max: chartCfg.y1.max,
    title: { display: true, text: 'AI评分' },
    grid: { drawOnChartArea: false },
    ticks: { stepSize: chartCfg.y1.stepSize, callback: function(v) { return v + ' 分'; } }
  };

  var y2Scale = {
    position: 'right',
    beginAtZero: false,
    title: { display: true, text: '体重 (kg)' },
    grid: { drawOnChartArea: false }
  };
  if (chartCfg.y2.min !== null && chartCfg.y2.min !== undefined) y2Scale.min = chartCfg.y2.min;
  if (chartCfg.y2.max !== null && chartCfg.y2.max !== undefined) y2Scale.max = chartCfg.y2.max;
  y2Scale.ticks = {};
  if (chartCfg.y2.stepSize !== null && chartCfg.y2.stepSize !== undefined) y2Scale.ticks.stepSize = chartCfg.y2.stepSize;
  var y2TickCb = getTickCallback(chartCfg.y2.precision);
  if (y2TickCb) y2Scale.ticks.callback = y2TickCb;

  if (chartInstance) chartInstance.destroy();
  var ctx = document.getElementById('trendChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels: result.labels, datasets: chartDatasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        tooltip: {
          callbacks: {
            label: function(ctx) {
              if (ctx.dataset.yAxisID === 'y1') {
                return ctx.dataset.label + ': ' + ctx.parsed.y + ' 分';
              }
              if (ctx.dataset.yAxisID === 'y2') {
                return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + ' kg';
              }
              return ctx.dataset.label + ': ' + ctx.parsed.y + ' h';
            }
          }
        },
        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } }
      },
      scales: {
        y: yScale,
        y1: y1Scale,
        y2: y2Scale,
        x: { grid: { display: false } }
      }
    }
  });
}

// ── Theme ──


loadData();
</script>

<script>
/* kaoyan-alpha: complete card coverage */
(function(){
  var styleEl = document.getElementById('kaoyan-dyn-style');
  if(!styleEl){
    styleEl = document.createElement('style');
    styleEl.id = 'kaoyan-dyn-style';
    document.head.appendChild(styleEl);
  }
  function update(a){
    document.documentElement.style.setProperty('--card-alpha',a);
    styleEl.textContent = '.card,.form-card,.ver,.subj,.alloc,.detail-card,.fact-strip,.tl-panel,.str-panel,.prob,.sig-panel,.step-panel,.trig-panel,.pledge-panel,.day-cell,.history-item,.ban-item,.summary-card,.week-row,.stats-bar,.encourage-box,.header-bar,.header-card,.zone-title-card,.stats,.week-nav-btn,.empty-state,.btn-secondary,.review-card,.week-progress-bar{background:rgba(255,255,255,'+a+')!important}.day-dot,.day-selector .day-dot{background:rgba(255,255,255,'+a+')!important}@media(prefers-color-scheme:dark){.card,.form-card,.ver,.subj,.alloc,.detail-card,.fact-strip,.tl-panel,.str-panel,.prob,.sig-panel,.step-panel,.trig-panel,.pledge-panel,.day-cell,.history-item,.ban-item,.summary-card,.week-row,.stats-bar,.encourage-box,.header-bar,.header-card,.zone-title-card,.stats,.week-nav-btn,.empty-state,.btn-secondary,.review-card,.week-progress-bar{background:rgba(36,35,31,'+a+')!important}}';
  }
  update(0.92);
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='kaoyan-alpha') update(e.data.value);
    if(e.data&&e.data.type==='kaoyan-chart-config') {
      parentChartConfig = e.data.config;
      if(cachedLogs) renderChart();
    }
    if(e.data&&e.data.type==='kaoyan-reload') { if(cachedLogs) renderChart(); }
  });
  try{window.parent.postMessage({type:'kaoyan-ready'},'*');}catch(e){}
})();
</script>
